<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alamein Hospital - Antibiotic Protocol</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #0056b3; font-size: 24px; margin: 0; }
        .header p { color: #666; font-size: 14px; margin: 5px 0 0 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; }
        .checkbox-group input { width: auto; margin-left: 10px; transform: scale(1.5); }
        button { width: 100%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #004494; }
        .result-box { display: none; margin-top: 20px; padding: 15px; background-color: #e9f5e9; border: 1px solid #28a745; border-radius: 5px; }
        .result-box h3 { margin-top: 0; color: #28a745; }
        .copy-btn { background-color: #28a745; margin-top: 15px; }
        .copy-btn:hover { background-color: #218838; }
        .alert { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>مستشفى العلمين النموذجي</h1>
        <p>البروتوكول الوقائي للمضادات الحيوية - قسم الصيدلة الإكلينيكية</p>
    </div>

    <div class="form-group">
        <label for="department">اختر القسم:</label>
        <select id="department" onchange="updateProcedures()">
            <option value="">-- اختر القسم --</option>
            <option value="obs_gyn">النساء والتوليد (Obs & Gyn)</option>
            <option value="ortho">جراحة العظام (Orthopedics)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="procedure">نوع العملية:</label>
        <select id="procedure">
            <option value="">-- اختر العملية أولاً --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="weight">وزن المريض (كجم):</label>
        <input type="number" id="weight" placeholder="أدخل الوزن بالكيلوجرام">
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" id="allergy">
        <label for="allergy" style="margin:0;">المريض يعاني من حساسية البنسلين/السيفالوسبورين</label>
    </div>

    <button onclick="calculateProtocol()">عرض البروتوكول</button>

    <div id="resultBox" class="result-box">
        <h3>البروتوكول الموصى به:</h3>
        <p id="antibioticResult"></p>
        <button class="copy-btn" onclick="copyForApproval()">نسخ الطلب لاعتماد الصيدلي الإكلينيكي</button>
    </div>
</div>

<script>
    // القوائم المنسدلة للعمليات حسب القسم
    const procedures = {
        obs_gyn: [
            { value: "hysterectomy", text: "استئصال الرحم (Hysterectomy)" },
            { value: "c_section", text: "ولادة قيصرية (Cesarean Section)" },
            { value: "no_antibiotic", text: "منظار تشخيصي / تركيب لولب (Diagnostic / IUD)" }
        ],
        ortho: [
            { value: "joint_replacement", text: "تغيير مفصل (Total Joint Replacement)" },
            { value: "open_fracture_1", text: "كسر مفتوح درجة أولى/ثانية (Open Fracture I or II)" }
        ]
    };

    function updateProcedures() {
        const dept = document.getElementById("department").value;
        const procSelect = document.getElementById("procedure");
        procSelect.innerHTML = '<option value="">-- اختر العملية --</option>';
        
        if (dept && procedures[dept]) {
            procedures[dept].forEach(proc => {
                let option = document.createElement("option");
                option.value = proc.value;
                option.text = proc.text;
                procSelect.appendChild(option);
            });
        }
    }

    function calculateProtocol() {
        const dept = document.getElementById("department").value;
        const proc = document.getElementById("procedure").value;
        const weight = document.getElementById("weight").value;
        const allergy = document.getElementById("allergy").checked;
        const resultBox = document.getElementById("resultBox");
        const resultText = document.getElementById("antibioticResult");

        if (!dept || !proc || !weight) {
            alert("يرجى إكمال جميع البيانات (القسم، العملية، الوزن).");
            return;
        }

        let recommendation = "";

        // تطبيق قواعد قسم النساء والتوليد
        if (dept === "obs_gyn") {
            if (proc === "no_antibiotic") {
                recommendation = "<span class='alert'>لا يُنصح باستخدام المضادات الحيوية الوقائية لهذه العملية.</span>";
            } else if (proc === "hysterectomy") {
                if (allergy) {
                    recommendation = "<b>Clindamycin PLUS Gentamicin</b><br>تنويه: جرعة الجنتاميسين بناءً على الوزن والوظائف الكلوية.";
                } else {
                    recommendation = weight >= 120 ? "<b>Cefazolin 3 g IV</b> كجرعة مفردة" : "<b>Cefazolin 2 g IV</b> كجرعة مفردة";
                }
            } else if (proc === "c_section") {
                if (allergy) {
                    recommendation = "<b>Clindamycin PLUS Gentamicin</b>";
                } else {
                    recommendation = weight >= 120 ? "<b>Cefazolin 3 g IV</b>" : "<b>Cefazolin 2 g IV</b>";
                }
            }
        }

        // تطبيق قواعد قسم العظام
        if (dept === "ortho") {
            if (proc === "joint_replacement") {
                if (allergy) {
                    recommendation = "<b>Vancomycin 1 g IV infusion</b> (أو 1.5 g إذا كان الوزن > 80 كجم)";
                } else {
                    recommendation = "<b>Cefazolin 2 g IV</b> (للأطفال 30mg/kg حتى 2 جرام أقصى حد)";
                }
            } else if (proc === "open_fracture_1") {
                recommendation = allergy ? "<b>Clindamycin</b>" : "<b>Cefazolin 2 g IV</b><br>لمدة 24 ساعة.";
            }
        }

        recommendation += "<hr><b>طريقة الإعطاء:</b> خلال 60 دقيقة قبل الشق الجراحي (أو 120 دقيقة للـ Vancomycin).";

        resultText.innerHTML = recommendation;
        resultBox.style.display = "block";
    }

    function copyForApproval() {
        const procText = document.getElementById("procedure").options[document.getElementById("procedure").selectedIndex].text;
        const weight = document.getElementById("weight").value;
        const result = document.getElementById("antibioticResult").innerText;
        
        const textToCopy = `طلب اعتماد مضاد حيوي (العلمين النموذجي)\nالعملية: ${procText}\nالوزن: ${weight} كجم\nالبروتوكول المختار:\n${result}\n\nيرجى الاعتماد من الصيدلية الإكلينيكية.`;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("تم نسخ الطلب بنجاح! يمكنك الآن إرساله للصيدلي الإكلينيكي عبر واتساب أو نظام المستشفى.");
        });
    }
</script>

</body>
</html>
